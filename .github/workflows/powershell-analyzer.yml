name: Analyze PowerShell

on:
  workflow_call:
  workflow_dispatch:

jobs:
  analyze-powershell:
    runs-on: ubuntu-latest
    permissions:
      # required for all workflows
      security-events: write
      # only required for workflows in private repositories
      actions: read
      contents: read

    steps:
      - name: Checkout the Actions repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Ed-Fi-Alliance-OSS/Ed-Fi-Actions
          path: Ed-Fi-Actions

      - name: Checkout the repo to review
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: testing-repo

      - name: Analyze
        uses: ./Ed-Fi-Actions/powershell-analyzer
        id: powershell-analyzer
        with:
          directory: ./testing-repo/

      - name: Upload SARIF as Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
            name: analysis-result
            path: ./results.sarif
            retention-days: 10

      - name: Upload SARIF to CodeQL
        uses: github/codeql-action/upload-sarif@2d92b76c45b91eb80fc44c74ce3fce0ee94e8f9d # v3.29.5
        with:
          sarif_file: ./results.sarif
